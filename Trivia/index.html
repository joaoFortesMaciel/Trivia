<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia!</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="topo">
        <h1>Trivia!</h1>
    </div>

    <div class="container">
        <section>
            <h2>Part 1: Multiple Choice</h2>
            <hr>
            <h3>Qual é o maior planeta do nosso sistema solar?</h3>
            <div class="options">
                <button class="choice">Marte</button>
                <button class="choice">Saturno</button>
                <button class="choice" data-correct="true">Júpiter</button>
                <button class="choice">Vênus</button>
            </div>
            <p id="feedback1"></p>
        </section>

        <section>
            <h2>Part 2: Free Response</h2>
            <hr>
            <h3>Em qual país é ilegal ter apenas um porquinho-da-índia?</h3>
            <input type="text" id="free-answer" placeholder="Sua resposta...">
            <button id="check-btn">Check Answer</button>
            <p id="feedback2"></p>
        </section>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
